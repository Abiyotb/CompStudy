<!-- Always-visible loader (so page is never blank) -->
<script>
  const appDiv = document.getElementById("app");
  if (appDiv) {
    appDiv.innerHTML = `
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full rounded-2xl bg-white shadow p-6">
          <div class="text-2xl font-bold">CompStudy</div>
          <div class="text-sm text-slate-600 mt-1">Loading...</div>
          <div class="text-xs text-slate-500 mt-4">
            If this stays forever, open DevTools Console (F12) to see errors.
          </div>
        </div>
      </div>
    `;
  }
  window.addEventListener("error", (e) => {
    if (!appDiv) return;
    appDiv.innerHTML = `
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-2xl w-full rounded-2xl bg-white shadow p-6">
          <div class="text-xl font-bold text-red-700">CompStudy Error</div>
          <div class="text-sm text-slate-600 mt-2">A script error occurred:</div>
          <pre class="mt-3 p-3 rounded-xl bg-slate-100 text-xs overflow-auto">${String(e.message || e.error || e)}</pre>
          <div class="text-sm text-slate-600 mt-4">
            Most common causes:
            <ul class="list-disc ml-6 mt-2">
              <li>Opened as file:/// instead of http://</li>
              <li>Firebase config still has REPLACE_ME</li>
              <li>Wrong Firebase project config</li>
            </ul>
          </div>
        </div>
      </div>
    `;
  });
</script>

<script type="module">
  const elApp = document.getElementById("app");

  function showFatal(title, details) {
    if (!elApp) return;
    elApp.innerHTML = `
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-2xl w-full rounded-2xl bg-white shadow p-6">
          <div class="text-xl font-bold text-red-700">${title}</div>
          <pre class="mt-3 p-3 rounded-xl bg-slate-100 text-xs overflow-auto">${details}</pre>
        </div>
      </div>
    `;
  }

  // ✅ Replace this with your real config
  const FIREBASE_CONFIG = {
    apiKey: "REPLACE_ME",
    authDomain: "REPLACE_ME",
    projectId: "REPLACE_ME",
    appId: "REPLACE_ME",
  };

  // Stop early if config is not set
  const configText = JSON.stringify(FIREBASE_CONFIG);
  if (configText.includes("REPLACE_ME")) {
    showFatal(
      "Firebase config not set",
      "Go to Firebase Console → Project settings → Your apps → Web app → Config, then paste values into FIREBASE_CONFIG.\n\nCurrent FIREBASE_CONFIG:\n" +
        configText
    );
    throw new Error("Firebase config still has REPLACE_ME");
  }

  // Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import {
    getAuth,
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    updateProfile,
    signOut,
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    runTransaction,
    serverTimestamp,
    addDoc,
    collection,
    query,
    where,
    getDocs,
    onSnapshot,
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  // Init Firebase (wrap in try/catch so we can display errors)
  let app, auth, db;
  try {
    app = initializeApp(FIREBASE_CONFIG);
    auth = getAuth(app);
    db = getFirestore(app);
  } catch (e) {
    showFatal("Firebase initialization failed", String(e?.message || e));
    throw e;
  }

  // Minimal render proof (you should see this immediately after config works)
  elApp.innerHTML = `
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="max-w-md w-full rounded-2xl bg-white shadow p-6">
        <div class="text-2xl font-bold">CompStudy</div>
        <div class="text-sm text-slate-600 mt-1">Firebase connected ✅</div>
        <div class="text-xs text-slate-500 mt-4">Now paste back the full app UI code under this section.</div>
      </div>
    </div>
  `;

  // If you want, I can merge this patch back into the FULL app code you already have,
  // so you keep all pages + auth + setup + friends, but with better error reporting.
</script>
